{% extends "layouts/layout.html" %}

{% block title %}Editar Perfil - Vibras{% endblock %}

{% block content %}
<section class="perfil-container">
    <div class="back-link">
        <a href="{{ url_for('routes_user.perfil') }}" class="back-home-link">
            <i class="fas fa-arrow-left"></i> Volver a Mis Datos
        </a>
    </div>

    <h1 class="panel-title">Actualizar Información</h1>

    <div class="data-card">
        <form action="{{ url_for('routes_user.update_user') }}" method="POST" class="edit-form">
            <div class="form-grid">
                
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" value="{{ usuario.nombre }}" required>
                </div>
                
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" value="{{ usuario.apellido }}" required>
                </div>

                <div class="form-group full-width">
                    <label>Email (No editable)</label>
                    <input type="email" value="{{ usuario.email }}" disabled style="opacity: 0.7; cursor: not-allowed; background-color: #eee;">
                </div>

                <div class="form-group full-width">
                    <label for="direccion">Dirección completa</label>
                    <input type="text" id="direccion" name="direccion" 
                           value="{{ usuario.direccion if usuario.direccion else '' }}" 
                           placeholder="Ej: Av. Santa Fe 1234, CABA">
                </div>

                <div class="form-group full-width">
                    <label for="telefono">Teléfono celular</label>
                    <input type="text" id="telefono" name="telefono" 
                           value="{{ usuario.telefono if usuario.telefono else '' }}" 
                           placeholder="Ej: 11 2345 6789">
                </div>
            </div>

            <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--gris-suave);">

            <h3 style="color: var(--rosa-principal); margin-bottom: 25px;"><i class="fas fa-lock"></i> Seguridad</h3>

            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Contraseña actual</label>
                    <div class="password-box">
                        <input type="password" name="password_actual" id="password_actual" placeholder="Escribe tu contraseña actual">
                        <span class="toggle-password" onclick="togglePassword('password_actual', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Nueva contraseña</label>
                    <div class="password-box">
                        <input type="password" name="password_nueva" id="password_nueva" placeholder="Mínimo 6 caracteres">
                        <span class="toggle-password" onclick="togglePassword('password_nueva', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmar nueva contraseña</label>
                    <div class="password-box">
                        <input type="password" name="password_confirmacion" id="password_confirmacion" placeholder="Repite la nueva contraseña">
                        <span class="toggle-password" onclick="togglePassword('password_confirmacion', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <button type="submit" class="btn-editar">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
                <a href="{{ url_for('routes_user.perfil') }}" class="btn-logout" style="border-color: #999; color: #999;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</section>

<script>
function togglePassword(id, el) {
    const input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        el.innerHTML = '<i class="fas fa-eye-slash"></i>';
    } else {
        input.type = "password";
        el.innerHTML = '<i class="fas fa-eye"></i>';
    }
}
</script>
{% endblock %}
