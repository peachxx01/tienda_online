{% extends 'layouts/layout.html' %}

{% block title %}Inicio{% endblock %}

{% block content %}

<section class="hero-banner">
    <img src="{{ url_for('static', filename='img/banner_principal.png') }}"
         alt="Promoción principal">
</section>

<section class="productos-populares">
    <h2>Productos Destacados</h2>

    <div class="grid-productos">
        {% for producto in productos_populares %}
                <div class="card-producto">
                    <a href="{{ url_for('routes_productos.detalle_producto', id_producto=producto.id_producto) }}" class="card-link">
                        {% if producto.imagen %}
                            <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}">
                        {% else %}
                            <img src="{{ url_for('static', filename='img/no-image.png') }}" alt="Sin imagen">
                        {% endif %}
                        <h3>{{ producto.nombre }}</h3>
                        <p class="precio">${{ producto.precio_venta }}</p>
                    </a>

                    <form action="{{ url_for('routes_carrito.agregar_al_carrito', id_producto=producto.id_producto) }}" method="POST">
                        <button type="submit" class="btn-agregar">Agregar al carrito</button>
                    </form>
                </div>
        {% endfor %}
    </div>
</section>

{% endblock %}
