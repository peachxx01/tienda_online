{% extends "layouts/layout_admin.html" %}

{% block title %}Crear Producto{% endblock %}
{% block page_title %}Crear Producto{% endblock %}

{% block content %}

<form method="POST" enctype="multipart/form-data" class="admin-form">

    <div class="form-grid">

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Precio Venta</label>
            <input type="number" step="0.01" name="precio_venta" min="0" required>
        </div>

        <div class="form-group">
            <label>Precio Compra</label>
            <input type="number" step="0.01" name="precio_compra" min="0" required>
        </div>

        <div class="form-group">
            <label>Stock</label>
            <input type="number" name="stock" min="0" required>
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <select name="categoria_id" required>
                {% for categoria in categorias %}
                    <option value="{{ categoria.id_categoria }}">
                        {{ categoria.nombre }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group full-width">
            <label>Descripción</label>
            <textarea name="descripcion" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>Imagen (jpg, jpeg, png)</label>
            <input type="file" name="imagen" accept=".jpg,.jpeg,.png">
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" name="popular">
            <label>Producto popular</label>
        </div>

    </div>

    <div class="form-actions">
        <button type="submit" class="btn-primary">
            Guardar Producto
        </button>
    </div>

</form>

{% endblock %}
